<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0D1117; }
    #map { width:100vw; height:100vh; }

    #info {
      position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
      background:rgba(13,17,23,0.88); color:#8B949E;
      font-family:sans-serif; font-size:12px;
      padding:6px 16px; border-radius:20px; z-index:1000;
      white-space:nowrap; border:1px solid rgba(88,166,255,0.2);
      pointer-events:none;
    }

    #legend {
      position:absolute; top:12px; right:12px;
      background:rgba(13,17,23,0.88); border-radius:12px;
      padding:10px 12px; z-index:1000;
      font-family:sans-serif; font-size:11px; color:#8B949E;
      border:1px solid rgba(88,166,255,0.15);
    }
    .legend-bar { display:flex; align-items:center; margin-top:6px; }
    .legend-gradient {
      width:90px; height:7px; border-radius:4px;
      background:linear-gradient(to right,#00BFFF,#00FF7F,#FFFF00,#FF8C00,#FF2222);
    }
    .legend-labels {
      display:flex; justify-content:space-between;
      width:90px; margin-top:3px; font-size:9px; color:#6E7681;
    }

    #location-btn {
      position:absolute; bottom:24px; right:12px;
      background:rgba(13,17,23,0.88); border:1px solid rgba(88,166,255,0.3);
      border-radius:50%; width:40px; height:40px;
      display:flex; align-items:center; justify-content:center;
      z-index:1000; cursor:pointer; color:#58A6FF; font-size:18px;
    }
    #location-btn:active { background:rgba(88,166,255,0.15); }

    .leaflet-control-zoom { border:none !important; }
    .leaflet-control-zoom a {
      background:#161B22 !important; color:#58A6FF !important;
      border:1px solid #30363D !important; border-radius:6px !important;
      margin-bottom:2px !important;
    }
    .leaflet-control-zoom a:hover { background:#1C2333 !important; }
  </style>
</head>
<body>
<div id="map"></div>
<div id="info">Cargando radar...</div>
<div id="legend">
  Precipitaci&#243;n
  <div class="legend-bar"><div class="legend-gradient"></div></div>
  <div class="legend-labels"><span>Ligera</span><span>Intensa</span></div>
</div>
<div id="location-btn" onclick="goToMyLocation()">&#9654;</div>

<script>
  // Initial location (Spain default, overridden from Android)
  var myLat = 40.4, myLon = -3.7, myZoom = 6;
  var userMarker = null;

  var map = L.map('map', { zoomControl:true, attributionControl:false })
             .setView([myLat, myLon], myZoom);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains:'abcd', maxZoom:18
  }).addTo(map);

  // Called from Android with actual device location
  function setUserLocation(lat, lon) {
    myLat = lat; myLon = lon;
    map.setView([lat, lon], 7, { animate: true });
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([lat, lon], {
      radius: 8,
      fillColor: '#58A6FF',
      color: '#FFFFFF',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.9
    }).addTo(map).bindPopup('Tu ubicaci&#243;n').openPopup();
  }

  function goToMyLocation() {
    if (myLat && myLon) {
      map.setView([myLat, myLon], 7, { animate: true });
    }
  }

  // Radar animation
  var frames = [], currentFrame = 0, radarLayer = null, timer = null;

  function fmt(ts) {
    var d = new Date(ts * 1000);
    var h = String(d.getHours()).padStart(2,'0');
    var m = String(d.getMinutes()).padStart(2,'0');
    var months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return d.getDate()+' '+months[d.getMonth()]+' '+h+':'+m;
  }

  function showFrame(i) {
    if (!frames.length) return;
    if (radarLayer) { map.removeLayer(radarLayer); radarLayer = null; }
    radarLayer = L.tileLayer(
      'https://tilecache.rainviewer.com' + frames[i].path + '/256/{z}/{x}/{y}/6/1_1.png',
      { opacity: 0.65, tileSize: 256 }
    ).addTo(map);
    var lbl = (i === frames.length - 1) ? '\uD83D\uDD34 Ahora: ' : '&#9654; ';
    document.getElementById('info').innerHTML = lbl + fmt(frames[i].time);
  }

  function loadRadar() {
    fetch('https://api.rainviewer.com/public/weather-maps.json')
      .then(function(r){ return r.json(); })
      .then(function(data){
        frames = (data.radar.past || []).slice(-8);
        if (!frames.length) return;
        currentFrame = frames.length - 1;
        showFrame(currentFrame);
        if (timer) clearInterval(timer);
        setTimeout(function(){
          timer = setInterval(function(){
            currentFrame = (currentFrame + 1) % frames.length;
            showFrame(currentFrame);
          }, 700);
        }, 2000);
      })
      .catch(function(){ document.getElementById('info').textContent = 'Sin conexi&#243;n al radar'; });
  }

  loadRadar();
  setInterval(function(){ if(timer) clearInterval(timer); loadRadar(); }, 300000);
</script>
</body>
</html>
