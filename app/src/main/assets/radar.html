<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; padding:0; background:#0D1117; }
        #mapid { position:absolute; top:0; left:0; right:0; bottom:0; background:#0D1117; }
        #controls {
            position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
            z-index:1000; background:rgba(13,17,23,0.92); border-radius:20px;
            padding:8px 16px; display:flex; align-items:center; gap:10px;
            color:#C9D1D9; font-family:sans-serif; font-size:13px;
            border:1px solid rgba(88,166,255,0.2);
        }
        #controls button {
            background:none; border:1px solid rgba(88,166,255,0.3);
            color:#58A6FF; border-radius:6px; width:32px; height:32px;
            cursor:pointer; font-size:16px;
        }
        .leaflet-control-attribution { font-size:8px !important; opacity:0.5; }
        .leaflet-control-zoom a {
            background:#161B22 !important; color:#58A6FF !important;
            border:1px solid #30363D !important;
        }
    </style>
</head>
<body>

<div id="mapid"></div>
<div id="controls">
    <button onclick="stop(); showFrame(animationPosition - 1);">&#9664;</button>
    <button id="playBtn" onclick="playStop();">&#9654;</button>
    <button onclick="stop(); showFrame(animationPosition + 1);">&#9654;</button>
    <span id="timestamp">Cargando...</span>
</div>

<script>
// === EXACT PATTERN FROM OFFICIAL RAINVIEWER EXAMPLE ===
// https://github.com/rainviewer/rainviewer-api-example

var TILE_SIZE = window.devicePixelRatio >= 2 ? 512 : 256;
var RADAR_OPACITY = 0.8;
var ANIMATION_DELAY_MS = 500;
var API_URL = "https://api.rainviewer.com/public/weather-maps.json";

var apiData = {};
var mapFrames = [];
var animationPosition = 0;
var animationTimer = false;
var currentLayer = null;
var isLoading = false;
var layerCache = {};
var userMarker = null;

var map = L.map('mapid', { maxZoom: 12, zoomControl: true }).setView([40.4, -3.7], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
    attribution: '&copy; CARTO &copy; OSM | RainViewer',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

// Called from Android to set GPS position
function setUserLocation(lat, lon) {
    map.setView([lat, lon], 7, {animate: true});
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([lat, lon], {
        radius: 8, fillColor: '#58A6FF', color: '#FFF',
        weight: 2, opacity: 1, fillOpacity: 0.9
    }).addTo(map);
}

function wrapPosition(position) {
    while (position >= mapFrames.length) position -= mapFrames.length;
    while (position < 0) position += mapFrames.length;
    return position;
}

function formatTime(timestamp) {
    var d = new Date(timestamp * 1000);
    var h = ('0' + d.getHours()).slice(-2);
    var m = ('0' + d.getMinutes()).slice(-2);
    return h + ':' + m;
}

function createRadarLayer(frame) {
    return new L.TileLayer(
        apiData.host + frame.path + '/' + TILE_SIZE + '/{z}/{x}/{y}/2/1_1.png',
        { tileSize: 256, opacity: 0.001, maxNativeZoom: 7, maxZoom: 12 }
    );
}

function clearLayerCache() {
    stop();
    for (var pos in layerCache) {
        if (parseInt(pos) !== animationPosition) {
            map.removeLayer(layerCache[pos]);
            delete layerCache[pos];
        }
    }
}

function stop() {
    if (animationTimer) {
        clearTimeout(animationTimer);
        animationTimer = false;
        document.getElementById("playBtn").innerHTML = "&#9654;";
        return true;
    }
    return false;
}

function play() {
    animationTimer = true;
    document.getElementById("playBtn").innerHTML = "&#9646;&#9646;";
    showFrame(animationPosition + 1);
}

function playStop() {
    if (!stop()) play();
}

function showFrame(position) {
    if (isLoading) return;

    position = wrapPosition(position);
    var frame = mapFrames[position];

    document.getElementById("timestamp").innerHTML = formatTime(frame.time);

    var oldLayer = currentLayer;

    if (layerCache[position]) {
        if (oldLayer) oldLayer.setOpacity(0);
        layerCache[position].setOpacity(RADAR_OPACITY);
        currentLayer = layerCache[position];
        animationPosition = position;
        if (animationTimer) animationTimer = setTimeout(play, ANIMATION_DELAY_MS);
        return;
    }

    isLoading = true;
    var newLayer = createRadarLayer(frame);

    newLayer.on('load', function() {
        newLayer.setOpacity(RADAR_OPACITY);
        if (oldLayer) oldLayer.setOpacity(0);
        layerCache[position] = newLayer;
        currentLayer = newLayer;
        animationPosition = position;
        isLoading = false;
        if (animationTimer) animationTimer = setTimeout(play, ANIMATION_DELAY_MS);
    });

    newLayer.addTo(map);
}

function initialize(api) {
    clearLayerCache();
    currentLayer = null;
    mapFrames = [];
    animationPosition = 0;

    if (!api || !api.radar || !api.radar.past) {
        document.getElementById("timestamp").innerHTML = "Sin datos";
        return;
    }

    mapFrames = api.radar.past;
    showFrame(mapFrames.length - 1);
}

function loadApiData() {
    var apiRequest = new XMLHttpRequest();
    apiRequest.open("GET", API_URL, true);
    apiRequest.onload = function() {
        apiData = JSON.parse(apiRequest.response);
        initialize(apiData);
    };
    apiRequest.onerror = function() {
        document.getElementById("timestamp").innerHTML = "Error de red";
    };
    apiRequest.send();
}

map.on('movestart', clearLayerCache);
loadApiData();
</script>

</body>
</html>
